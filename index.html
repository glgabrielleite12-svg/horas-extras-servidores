<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestão de Horas Extras</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial}
  .fade{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  ::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
</style>
</head>
<body class="bg-slate-100 text-slate-800">

<!-- ===================== LOGIN ===================== -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
    <div class="bg-indigo-700 px-8 py-7 text-white">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-white/15 flex items-center justify-center text-xl">⏱️</div>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Gestão de Horas Extras</h1>
          <p class="text-indigo-200 text-xs">Registro · Conferência · Relatório</p>
        </div>
      </div>
    </div>
    <div class="px-8 py-7">
      <div class="flex gap-2 mb-6 bg-slate-100 p-1 rounded-lg text-sm font-medium">
        <button id="tab-login"  class="flex-1 py-2 rounded-md bg-white shadow-sm">Entrar</button>
        <button id="tab-signup" class="flex-1 py-2 rounded-md text-slate-500">Criar conta</button>
      </div>

      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">E-mail</label>
          <input name="email" type="email" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="voce@orgao.gov.br">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Senha</label>
          <input name="password" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••">
        </div>
        <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition">Entrar</button>
      </form>

      <form id="form-signup" class="space-y-4 hidden">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Nome completo</label>
          <input name="nome" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Seu nome">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Matrícula <span class="text-rose-500">*</span></label>
          <input name="matricula" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Sua matrícula funcional">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Setor <span class="text-rose-500">*</span></label>
          <select name="chefia_id" id="signup-chefia" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">E-mail</label>
          <input name="email" type="email" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="voce@orgao.gov.br">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Senha</label>
          <input name="password" type="password" required minlength="6" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="mínimo 6 caracteres">
        </div>
        <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition">Criar conta</button>
        <p class="text-xs text-slate-400">Escolha o seu setor. O 1º cadastro do sistema vira RH.</p>
      </form>

      <p id="auth-msg" class="mt-4 text-sm hidden rounded-lg px-3 py-2"></p>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app-screen" class="hidden min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="h-9 w-9 rounded-lg bg-indigo-600 text-white flex items-center justify-center">⏱️</div>
        <div>
          <div class="font-semibold text-sm leading-tight">Gestão de Horas Extras</div>
          <div id="hdr-papel" class="text-xs text-slate-400">—</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block">
          <div id="hdr-nome" class="text-sm font-medium leading-tight">—</div>
          <div id="hdr-mat" class="text-xs text-slate-400">—</div>
        </div>
        <div id="hdr-avatar" class="h-9 w-9 rounded-full bg-indigo-100 text-indigo-700 font-semibold flex items-center justify-center text-sm">?</div>
        <button id="btn-logout" class="text-sm text-slate-500 hover:text-rose-600 border border-slate-200 rounded-lg px-3 py-1.5">Sair</button>
      </div>
    </div>
    <nav id="nav" class="max-w-7xl mx-auto px-2 sm:px-6 flex gap-1 overflow-x-auto"></nav>
  </header>

  <main id="content" class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-6"></main>
  <footer class="text-center text-xs text-slate-400 py-4">Horas Extras · acesso por perfil protegido (RLS)</footer>
</div>

<div id="toast" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

<div id="modal" class="hidden fixed inset-0 z-40 bg-slate-900/50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg fade max-h-[92vh] overflow-y-auto">
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white">
      <h3 id="modal-title" class="font-semibold">Título</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
    </div>
    <div id="modal-body" class="px-6 py-5"></div>
  </div>
</div>

<script>
// ====================== CONFIG ======================
const SUPABASE_URL = "https://myseiqcspdnydzizfsio.supabase.co";
const SUPABASE_KEY = "sb_publishable_iL9Bicvs653VuDD5624Xow_VgZ_UK-e";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PAPEL_LABEL = { servidor:"Servidor", chefia:"Chefia", rh:"RH / Administração" };
const MIN_JUST = 20;
let SESSION=null, PERFIL=null, CURRENT_TAB=null, CFG={teto_diario_horas:2, mes_aberto:null};

// ====================== HELPERS ======================
const $ = s => document.querySelector(s);
const fmtData = d => d ? new Date(d+"T00:00:00").toLocaleDateString("pt-BR") : "—";
const fmtDataHora = d => d ? new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const hh = n => Number(n).toFixed(2).replace(/\.00$/,"").replace(".",",")+"h";
const thisMonth = () => new Date().toISOString().slice(0,7);
const hoje = () => new Date().toISOString().slice(0,10);
function monthRange(comp){ const [y,m]=comp.split("-").map(Number); return {ini:`${comp}-01`, fim:new Date(y,m,1).toISOString().slice(0,10)}; }
function compLabel(comp){ return new Date(comp+"-01T00:00:00").toLocaleDateString("pt-BR",{month:"long",year:"numeric"}); }
function mesAno(comp){ const d=new Date(comp+"-01T00:00:00"); const m=d.toLocaleDateString("pt-BR",{month:"long"}); return m.charAt(0).toUpperCase()+m.slice(1)+"/"+comp.slice(0,4); }
function ultimoDia(comp){ const [y,m]=comp.split("-").map(Number); return `${comp}-`+String(new Date(y,m,0).getDate()).padStart(2,"0"); }

function toast(msg, tipo="ok"){
  const c={ok:"bg-emerald-600",err:"bg-rose-600",info:"bg-slate-800"}[tipo];
  const d=document.createElement("div");
  d.className=`${c} text-white text-sm px-4 py-2.5 rounded-lg shadow-lg fade max-w-sm`;
  d.textContent=msg; $("#toast").appendChild(d); setTimeout(()=>d.remove(),5000);
}
function statusBadge(s){
  const m={pendente:"bg-amber-100 text-amber-700",aprovado:"bg-emerald-100 text-emerald-700",rejeitado:"bg-rose-100 text-rose-700"};
  const t={pendente:"Pendente",aprovado:"Aprovado",rejeitado:"Negado"};
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${m[s]}">${t[s]}</span>`;
}
function openModal(title,html){ $("#modal-title").textContent=title; $("#modal-body").innerHTML=html; $("#modal").classList.remove("hidden"); }
function closeModal(){ $("#modal").classList.add("hidden"); $("#modal-body").innerHTML=""; }
function stat(label,val,cor){
  const c={indigo:"text-indigo-600",emerald:"text-emerald-600",amber:"text-amber-600",rose:"text-rose-600",slate:"text-slate-700"}[cor]||"text-slate-700";
  return `<div class="bg-white border border-slate-200 rounded-xl p-4"><div class="text-xs text-slate-400">${label}</div><div class="text-xl font-semibold mt-1 ${c}">${val}</div></div>`;
}
function card(html){ return `<div class="bg-white border border-slate-200 rounded-xl p-5 max-w-lg mx-auto fade">${html}</div>`; }

// ====================== AUTH ======================
$("#tab-login").onclick=()=>swapAuth(true);
$("#tab-signup").onclick=()=>swapAuth(false);
function swapAuth(login){
  $("#form-login").classList.toggle("hidden",!login);
  $("#form-signup").classList.toggle("hidden",login);
  $("#tab-login").className=`flex-1 py-2 rounded-md ${login?"bg-white shadow-sm":"text-slate-500"}`;
  $("#tab-signup").className=`flex-1 py-2 rounded-md ${!login?"bg-white shadow-sm":"text-slate-500"}`;
  authMsg("");
  if(!login) carregarChefiasSignup();
}
function authMsg(msg,err){
  const p=$("#auth-msg");
  if(!msg){p.classList.add("hidden");return;}
  p.className=`mt-4 text-sm rounded-lg px-3 py-2 ${err?"bg-rose-50 text-rose-700":"bg-emerald-50 text-emerald-700"}`;
  p.textContent=msg;
}
$("#form-login").onsubmit=async e=>{
  e.preventDefault();const f=e.target;
  const {error}=await sb.auth.signInWithPassword({email:f.email.value.trim(),password:f.password.value});
  if(error) authMsg(traduz(error.message),true);
};
$("#form-signup").onsubmit=async e=>{
  e.preventDefault();const f=e.target;
  const email=f.email.value.trim(), password=f.password.value;
  authMsg("Criando conta…",false);
  try{
    const r=await fetch(`${SUPABASE_URL}/functions/v1/cadastro`,{
      method:"POST",
      headers:{ "content-type":"application/json", apikey:SUPABASE_KEY, authorization:`Bearer ${SUPABASE_KEY}` },
      body:JSON.stringify({ nome:f.nome.value.trim(), matricula:f.matricula.value.trim(), chefia_id:(f.chefia_id?f.chefia_id.value:""), email, password })
    });
    const data=await r.json().catch(()=>({}));
    if(!r.ok || data.error){ return authMsg(data.error||"Não foi possível criar a conta.",true); }
    authMsg("Conta criada! Entrando…",false);
    const {error}=await sb.auth.signInWithPassword({email,password});
    if(error) authMsg("Conta criada! Agora é só clicar em Entrar.",false);
  }catch(_){ authMsg("Falha de conexão. Tente novamente.",true); }
};
function traduz(m){
  if(/Invalid login/i.test(m)) return "E-mail ou senha incorretos.";
  if(/already registered/i.test(m)) return "Este e-mail já está cadastrado.";
  if(/Email not confirmed/i.test(m)) return "E-mail ainda não confirmado.";
  if(/Password should/i.test(m)) return "A senha deve ter ao menos 6 caracteres.";
  return m;
}
$("#btn-logout").onclick=()=>sb.auth.signOut();

async function carregarChefiasSignup(){
  const sel=$("#signup-chefia");
  if(!sel) return;
  try{
    const { data, error } = await sb.rpc("he_chefias_publicas");
    if(error || !data || !data.length){
      sel.innerHTML='<option value="">— nenhum setor cadastrado ainda —</option>';
      sel.required=false; return;
    }
    sel.innerHTML='<option value="">— selecione seu setor —</option>'+data.map(c=>`<option value="${c.id}">${esc(c.nome)}${c.sigla?" ("+esc(c.sigla)+")":""}</option>`).join("");
    sel.required=true;
  }catch(_){ sel.innerHTML='<option value="">—</option>'; sel.required=false; }
}
carregarChefiasSignup();

// ====================== BOOT ======================
sb.auth.onAuthStateChange((_e,s)=>{SESSION=s;boot();});
sb.auth.getSession().then(({data})=>{SESSION=data.session;boot();});
async function boot(){
  if(!SESSION){ $("#auth-screen").classList.remove("hidden"); $("#app-screen").classList.add("hidden"); PERFIL=null; carregarChefiasSignup(); return; }
  const {data:perfil}=await sb.from("he_perfis").select("*").eq("user_id",SESSION.user.id).maybeSingle();
  PERFIL=perfil||{papel:"servidor",nome:SESSION.user.email,email:SESSION.user.email,servidor_id:null,matricula:null};
  const {data:cfg}=await sb.from("he_config").select("*").eq("id",1).maybeSingle();
  if(cfg) CFG=cfg;
  $("#auth-screen").classList.add("hidden"); $("#app-screen").classList.remove("hidden");
  renderHeader(); renderNav();
}
function renderHeader(){
  const n=PERFIL.nome||SESSION.user.email;
  $("#hdr-nome").textContent=n;
  $("#hdr-papel").textContent=PAPEL_LABEL[PERFIL.papel]||PERFIL.papel;
  $("#hdr-mat").textContent=PERFIL.matricula?("Matrícula "+PERFIL.matricula):"—";
  $("#hdr-avatar").textContent=(n||"?").trim().charAt(0).toUpperCase();
}
function tabsFor(p){
  if(p==="rh") return [["painel","Painel"],["lancamentos","Lançamentos"],["servidores","Servidores"],["chefias","Chefias"],["ajustes","Ajustes"],["relatorio","Relatório"]];
  if(p==="chefia") return [["aprovacoes","Conferência"],["equipe","Equipe"],["meus","Meus lançamentos"]];
  return [["meus","Meus lançamentos"]];
}
function renderNav(){
  const tabs=tabsFor(PERFIL.papel);
  $("#nav").innerHTML=tabs.map(([k,l])=>`<button data-tab="${k}" class="navbtn whitespace-nowrap px-4 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-indigo-600">${l}</button>`).join("");
  $("#nav").querySelectorAll(".navbtn").forEach(b=>b.onclick=()=>go(b.dataset.tab));
  go(tabs[0][0]);
}
function go(tab){
  CURRENT_TAB=tab;
  $("#nav").querySelectorAll(".navbtn").forEach(b=>{
    const on=b.dataset.tab===tab;
    b.className=`navbtn whitespace-nowrap px-4 py-3 text-sm font-medium border-b-2 ${on?"border-indigo-600 text-indigo-700":"border-transparent text-slate-500 hover:text-indigo-600"}`;
  });
  const fn={meus:viewMeus,aprovacoes:viewAprovacoes,equipe:viewEquipe,painel:viewPainel,lancamentos:viewLancamentos,servidores:viewServidores,chefias:viewChefias,ajustes:viewAjustes,relatorio:viewRelatorio}[tab];
  $("#content").innerHTML=`<div class="text-slate-400 text-sm py-10 text-center">Carregando…</div>`;
  fn&&fn();
}

// ====================== DATA ======================
async function getRegistros(f={}){
  let q=sb.from("he_vw_registros").select("*").order("data",{ascending:false});
  if(f.comp){const {ini,fim}=monthRange(f.comp);q=q.gte("data",ini).lt("data",fim);}
  if(f.status)q=q.eq("status",f.status);
  if(f.servidor_id)q=q.eq("servidor_id",f.servidor_id);
  const {data,error}=await q;
  if(error){toast(error.message,"err");return[];}
  return data||[];
}
async function getServidores(){
  const {data,error}=await sb.from("he_servidores").select("*").order("nome");
  if(error){toast(error.message,"err");return[];}
  return data||[];
}
async function getChefias(){
  const {data,error}=await sb.from("he_chefias").select("*").order("nome");
  if(error){toast(error.message,"err");return[];}
  return data||[];
}
async function getPerfis(){
  const {data}=await sb.from("he_perfis").select("*");
  return data||[];
}
async function getBloqueados(comp){
  const {ini,fim}=monthRange(comp);
  const {data}=await sb.from("he_dias_bloqueados").select("*").gte("data",ini).lt("data",fim).order("data");
  return data||[];
}

// ====================== TABELA DE REGISTROS ======================
function retornoChefia(r){
  let s="";
  if(r.horas_original!=null) s+=`<div class="text-xs text-indigo-600">Ajustado de ${hh(r.horas_original)} → ${hh(r.horas)} pela chefia</div>`;
  if(r.status!=="pendente"){
    s+=`<div class="text-xs text-slate-400">${r.status==="aprovado"?"Aprovado":"Negado"} em ${fmtDataHora(r.aprovado_em)}</div>`;
    if(r.observacao_aprovacao) s+=`<div class="text-xs text-slate-500 italic">“${esc(r.observacao_aprovacao)}”</div>`;
  }
  return s||`<span class="text-xs text-slate-300">—</span>`;
}
function tabela(rows,{servidor=true,retorno=false,acoes=null,justificativa=true}={}){
  if(!rows.length) return `<div class="text-center text-slate-400 py-10 text-sm">Nenhum lançamento.</div>`;
  return `<div class="overflow-x-auto bg-white rounded-xl border border-slate-200"><table class="w-full">
    <thead><tr class="text-left text-xs text-slate-400 border-b border-slate-100">
      <th class="px-3 py-2 font-medium">Data</th>
      ${servidor?`<th class="px-3 py-2 font-medium">Servidor</th>`:""}
      <th class="px-3 py-2 font-medium text-center">Horas</th>
      ${justificativa?`<th class="px-3 py-2 font-medium">Justificativa</th>`:""}
      <th class="px-3 py-2 font-medium text-center">Situação</th>
      ${retorno?`<th class="px-3 py-2 font-medium">Retorno da chefia</th>`:""}
      ${acoes?`<th class="px-3 py-2 font-medium text-right">Ações</th>`:""}
    </tr></thead><tbody>
    ${rows.map(r=>`<tr class="border-b border-slate-100 hover:bg-slate-50 align-top">
      <td class="px-3 py-2 text-sm whitespace-nowrap">${fmtData(r.data)}</td>
      ${servidor?`<td class="px-3 py-2 text-sm"><div class="font-medium">${esc(r.servidor_nome)}</div><div class="text-xs text-slate-400">${esc(r.matricula||"")}${r.chefia_sigla?" · "+esc(r.chefia_sigla):""}</div></td>`:""}
      <td class="px-3 py-2 text-sm text-center whitespace-nowrap">${hh(r.horas)}</td>
      ${justificativa?`<td class="px-3 py-2 text-sm max-w-xs"><div class="line-clamp-2">${esc(r.justificativa)}</div></td>`:""}
      <td class="px-3 py-2 text-center">${statusBadge(r.status)}</td>
      ${retorno?`<td class="px-3 py-2">${retornoChefia(r)}</td>`:""}
      ${acoes?`<td class="px-3 py-2 text-right whitespace-nowrap">${acoes(r)}</td>`:""}
    </tr>`).join("")}
    </tbody></table></div>`;
}

// ====================== NOVO LANÇAMENTO ======================
async function novoLancamento(ctx){
  const isRH = ctx && ctx.rh;
  const servFixoRH = isRH && ctx.servidorFixo;
  let servidores=[], servNome="";
  if(isRH && !servFixoRH) servidores=await getServidores();
  if(servFixoRH){ const sv=(window.__servidores||[]).find(x=>x.id===servFixoRH); servNome=sv?sv.nome:""; }
  // limites de data
  let minAttr="", maxAttr=`max="${hoje()}"`, hint="";
  if(!isRH && CFG.mes_aberto){
    const ini=CFG.mes_aberto+"-01", fim=ultimoDia(CFG.mes_aberto);
    minAttr=`min="${ini}"`; maxAttr=`max="${fim < hoje() ? fim : hoje()}"`;
    hint=`<p class="text-xs text-amber-600">Lançamentos liberados apenas para ${compLabel(CFG.mes_aberto)}.</p>`;
  }
  const maxHoras = isRH ? "" : `max="${CFG.teto_diario_horas}"`;
  openModal("Novo lançamento de horas extras",`
    <form id="f-lanc" class="space-y-4">
      ${isRH?(servFixoRH
        ? `<div class="text-sm bg-slate-50 rounded-lg p-3">Servidor: <b>${esc(servNome)}</b></div>`
        : `<div><label class="block text-xs font-medium text-slate-600 mb-1">Servidor</label>
            <select name="servidor_id" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
              <option value="">Selecione…</option>
              ${servidores.map(s=>`<option value="${s.id}">${esc(s.nome)} · ${esc(s.matricula)}</option>`).join("")}
            </select></div>`)
      :""}
      ${isRH?`<p class="text-xs text-slate-400">Como RH, não há limite de horas nem bloqueio de dia, e o lançamento já entra aprovado.</p>`:""}
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-xs font-medium text-slate-600 mb-1">Data</label>
          <input name="data" type="date" required value="${hoje()}" ${minAttr} ${maxAttr} class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></div>
        <div><label class="block text-xs font-medium text-slate-600 mb-1">Horas ${isRH?"":`(máx. ${hh(CFG.teto_diario_horas)}/dia)`}</label>
          <input name="horas" type="number" step="0.5" min="0.5" ${maxHoras} required placeholder="ex: 2" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></div>
      </div>
      ${hint}
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Justificativa <span class="text-rose-500">*</span> (mín. ${MIN_JUST} caracteres)</label>
        <textarea name="justificativa" rows="3" required minlength="${MIN_JUST}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Descreva o motivo da hora extra neste dia"></textarea>
        <div class="text-xs text-slate-400 mt-1"><span id="just-count">0</span>/${MIN_JUST}</div>
      </div>
      <div id="lanc-aviso" class="hidden text-xs rounded-lg px-3 py-2 bg-rose-50 text-rose-700"></div>
      <div class="flex gap-2 pt-1">
        <button type="button" onclick="closeModal()" class="flex-1 py-2.5 rounded-lg border border-slate-300 text-sm">Cancelar</button>
        <button class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-medium">Salvar</button>
      </div>
    </form>`);
  const f=$("#f-lanc");
  const just=f.justificativa, cnt=$("#just-count");
  just.oninput=()=>{cnt.textContent=just.value.trim().length;};
  let bloqSet=new Set();
  if(!isRH){
    const refresh=async()=>{ const b=await getBloqueados(f.data.value.slice(0,7)); bloqSet=new Set(b.map(x=>x.data)); validar(); };
    const validar=()=>{
      const av=$("#lanc-aviso");
      if(bloqSet.has(f.data.value)){ av.textContent="Este dia está bloqueado para horas extras. Escolha outra data."; av.classList.remove("hidden"); }
      else av.classList.add("hidden");
    };
    f.data.onchange=refresh; await refresh();
  }
  f.onsubmit=async ev=>{
    ev.preventDefault();
    if(just.value.trim().length<MIN_JUST){ toast(`Justificativa precisa de ao menos ${MIN_JUST} caracteres.`,"err"); return; }
    const payload={
      servidor_id: isRH ? (servFixoRH || f.servidor_id.value) : ctx.servidorFixo,
      data:f.data.value, horas:Number(f.horas.value),
      justificativa:just.value.trim(), registrado_por:SESSION.user.id
    };
    if(isRH){ payload.status="aprovado"; payload.aprovado_por=SESSION.user.id; payload.aprovado_em=new Date().toISOString(); }
    const {error}=await sb.from("he_registros").insert(payload);
    if(error){ toast(traduzDB(error.message),"err"); return; }
    closeModal(); toast("Lançamento registrado."); go(CURRENT_TAB);
  };
}
function traduzDB(m){
  if(/he_just_min/i.test(m)) return `A justificativa precisa de ao menos ${MIN_JUST} caracteres.`;
  if(/futura/i.test(m)) return "Não é possível lançar horas em data futura.";
  if(/competencia/i.test(m)) return m;
  if(/bloqueado/i.test(m)) return m;
  if(/Teto diario/i.test(m)) return m.replace("diario","diário");
  if(/duplicate key/i.test(m)) return "Registro duplicado.";
  return m;
}

    ev.preventDefault();const f=ev.target;
    const payload={nome:f.nome.value.trim(),matricula:f.matricula.value.trim(),chefia_id:f.chefia_id.value||null};
    const resp=s?await sb.from("he_servidores").update(payload).eq("id",s.id):await sb.from("he_servidores").insert(payload);
    if(resp.error){toast(/duplicate/i.test(resp.error.message)?"Matrícula já cadastrada.":resp.error.message,"err");return;}
    if(perfil && f.papel){ await sb.from("he_perfis").update({papel:f.papel.value}).eq("user_id",perfil.user_id); }
    closeModal();toast("Servidor salvo.");go(CURRENT_TAB);
  };
}
async function excluirServidor(id){
  const s=(window.__servidores||[]).find(x=>x.id===id);
  if(!confirm(`Excluir o servidor "${s?s.nome:""}"? Remove os lançamentos e o acesso dele.`))return;
  await sb.from("he_perfis").delete().eq("servidor_id",id);
  const {error}=await sb.from("he_servidores").delete().eq("id",id);
  if(error){toast(error.message,"err");return;}
  toast("Servidor excluído.");go(CURRENT_TAB);
}
function editarAcesso(p){
  const servs=window.__servidores||[];
  openModal("Gerenciar acesso",`
    <div class="text-sm mb-3"><b>${esc(p.nome||p.email)}</b> <span class="text-slate-400">${esc(p.email||"")}</span></div>
    <form id="f-ac" class="space-y-3">
      <div><label class="block text-xs font-medium text-slate-600 mb-1">Papel</label>
        <select name="papel" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
          ${Object.entries(PAPEL_LABEL).map(([k,v])=>`<option value="${k}"${p.papel===k?" selected":""}>${v}</option>`).join("")}</select></div>
      <div><label class="block text-xs font-medium text-slate-600 mb-1">Vincular a um servidor</label>
        <select name="servidor_id" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"><option value="">—</option>
          ${servs.map(s=>`<option value="${s.id}"${p.servidor_id===s.id?" selected":""}>${esc(s.nome)} · ${esc(s.matricula)}</option>`).join("")}</select></div>
      <div class="flex gap-2 pt-1"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 rounded-lg border border-slate-300 text-sm">Cancelar</button>
        <button class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-medium">Salvar</button></div>
    </form>`);
  $("#f-ac").onsubmit=async ev=>{
    ev.preventDefault();const f=ev.target;
    const {error}=await sb.from("he_perfis").update({papel:f.papel.value,servidor_id:f.servidor_id.value||null}).eq("user_id",p.user_id);
    if(error){toast(error.message,"err");return;}
    closeModal();toast("Acesso atualizado.");go("servidores");
  };
}

// ====================== VIEW: CHEFIAS ======================
async function viewChefias(){
  const [chefias,servs]=await Promise.all([getChefias(),getServidores()]);
  window.__chefias=chefias; window.__servidores=servs;
  const nomeServ={}; servs.forEach(s=>nomeServ[s.id]=s.nome);
  const cont={}; servs.forEach(s=>{ if(s.chefia_id) cont[s.chefia_id]=(cont[s.chefia_id]||0)+1; });
  $("#content").innerHTML=`
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <div><h2 class="text-lg font-semibold">Chefias / Setores</h2><p class="text-sm text-slate-500">Unidades às quais os servidores se vinculam (ex: Chefia de Gabinete). Cada uma tem um responsável que aprova as horas.</p></div>
      <button onclick='editarChefia(null)' class="bg-indigo-600 text-white text-sm font-medium px-3 py-1.5 rounded-lg">+ Nova chefia</button>
    </div>
    <div class="overflow-x-auto bg-white rounded-xl border border-slate-200"><table class="w-full">
      <thead><tr class="text-left text-xs text-slate-400 border-b border-slate-100">
        <th class="px-3 py-2 font-medium">Chefia (unidade)</th><th class="px-3 py-2 font-medium">Sigla</th><th class="px-3 py-2 font-medium">Responsável (aprova)</th>
        <th class="px-3 py-2 font-medium text-center">Servidores</th><th class="px-3 py-2 font-medium text-right">Ações</th></tr></thead>
      <tbody>${chefias.map(c=>`<tr class="border-b border-slate-100 hover:bg-slate-50">
        <td class="px-3 py-2 text-sm font-medium">${esc(c.nome)}</td>
        <td class="px-3 py-2 text-sm">${esc(c.sigla||"—")}</td>
        <td class="px-3 py-2 text-sm">${esc(nomeServ[c.responsavel_servidor_id]||"— não definido —")}</td>
        <td class="px-3 py-2 text-sm text-center">${cont[c.id]||0}</td>
        <td class="px-3 py-2 text-right whitespace-nowrap">
          <button onclick='editarChefia("${c.id}")' class="text-xs text-indigo-600 hover:underline mr-2">editar</button>
          <button onclick='excluirChefia("${c.id}")' class="text-xs text-rose-600 hover:underline">excluir</button>
        </td>
      </tr>`).join("")||`<tr><td colspan="5" class="text-center text-slate-400 py-8 text-sm">Nenhuma chefia. Cadastre as unidades (ex: Chefia de Gabinete).</td></tr>`}</tbody></table></div>`;
}
function editarChefia(id){
  const c = id ? (window.__chefias||[]).find(x=>x.id===id) : null;
  const servs = window.__servidores||[];
  openModal(c?"Editar chefia":"Nova chefia",`
    <form id="f-ch" class="space-y-3">
      <div class="grid grid-cols-3 gap-3">
        <div class="col-span-2"><label class="block text-xs font-medium text-slate-600 mb-1">Nome da chefia (unidade)</label>
          <input name="nome" required value="${c?esc(c.nome):""}" placeholder="Ex: Chefia de Gabinete" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></div>
        <div><label class="block text-xs font-medium text-slate-600 mb-1">Sigla</label>
          <input name="sigla" value="${c?esc(c.sigla||""):""}" placeholder="Ex: GAB" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></div>
      </div>
      <div><label class="block text-xs font-medium text-slate-600 mb-1">Responsável (quem confere/aprova)</label>
        <select name="responsavel" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
          <option value="">— definir depois —</option>
          ${servs.map(s=>`<option value="${s.id}"${c&&c.responsavel_servidor_id===s.id?" selected":""}>${esc(s.nome)} · ${esc(s.matricula)}</option>`).join("")}
        </select>
        <p class="text-xs text-slate-400 mt-1">Pode ser qualquer servidor da lista. Ele ganha acesso de chefia para aprovar as horas desta unidade.</p></div>
      <div class="flex gap-2 pt-1"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 rounded-lg border border-slate-300 text-sm">Cancelar</button>
        <button class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-medium">Salvar</button></div>
    </form>`);
  $("#f-ch").onsubmit=async ev=>{
    ev.preventDefault();const f=ev.target;
    const novoResp=f.responsavel.value||null;
    const antigoResp=c?c.responsavel_servidor_id:null;
    const payload={nome:f.nome.value.trim(), sigla:f.sigla.value.trim()||null, responsavel_servidor_id:novoResp};
    const resp=c?await sb.from("he_chefias").update(payload).eq("id",c.id):await sb.from("he_chefias").insert(payload);
    if(resp.error){toast(resp.error.message,"err");return;}
    await sincronizarResponsavel(antigoResp, novoResp);
    closeModal();toast("Chefia salva.");go("chefias");
  };
}
async function sincronizarResponsavel(antigo, novo){
  if(novo){ await sb.from("he_perfis").update({papel:"chefia"}).eq("servidor_id",novo); }
  if(antigo && antigo!==novo){
    const {count}=await sb.from("he_chefias").select("id",{count:"exact",head:true}).eq("responsavel_servidor_id",antigo);
    if(!count){ await sb.from("he_perfis").update({papel:"servidor"}).eq("servidor_id",antigo); }
  }
}
async function excluirChefia(id){
  const c=(window.__chefias||[]).find(x=>x.id===id);
  if(!confirm(`Excluir a chefia "${c?c.nome:""}"? Os servidores vinculados ficarão sem setor.`))return;
  const {error}=await sb.from("he_chefias").delete().eq("id",id);
  if(error){toast(error.message,"err");return;}
  if(c&&c.responsavel_servidor_id){ await sincronizarResponsavel(c.responsavel_servidor_id, null); }
  toast("Chefia excluída.");go("chefias");
}

// ====================== VIEW: AJUSTES (parâmetros + dias) ======================
async function viewAjustes(){
  const {data:c}=await sb.from("he_config").select("*").eq("id",1).maybeSingle();
  const comp=window.__compBloq||thisMonth();
  const bloq=await getBloqueados(comp);
  const set=new Map(bloq.map(b=>[b.data,b.motivo]));
  const [y,m]=comp.split("-").map(Number);
  const nDias=new Date(y,m,0).getDate(), offset=new Date(y,m-1,1).getDay();
  const sem=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  let cells="";
  for(let i=0;i<offset;i++) cells+=`<div></div>`;
  for(let d=1;d<=nDias;d++){
    const ds=`${comp}-${String(d).padStart(2,"0")}`; const b=set.has(ds);
    cells+=`<button onclick="toggleDia('${ds}',${b})" title="${b?esc(set.get(ds)||'Bloqueado'):'Liberado'}"
      class="aspect-square rounded-lg text-sm flex items-center justify-center border ${b?'bg-rose-100 border-rose-300 text-rose-700 font-semibold':'bg-white border-slate-200 hover:border-indigo-300'}">${d}</button>`;
  }
  $("#content").innerHTML=`
    <div class="mb-4"><h2 class="text-lg font-semibold">Ajustes</h2><p class="text-sm text-slate-500">Limite diário, mês liberado para lançamento e dias bloqueados.</p></div>
    <div class="grid lg:grid-cols-2 gap-5">
      <form id="f-cfg" class="bg-white border border-slate-200 rounded-xl p-5 space-y-4 h-fit">
        <h3 class="font-semibold text-sm">Parâmetros</h3>
        <div><label class="block text-xs font-medium text-slate-600 mb-1">Teto diário (horas)</label>
          <input name="teto_diario_horas" type="number" step="0.5" min="0" value="${c.teto_diario_horas}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></div>
        <div><label class="block text-xs font-medium text-slate-600 mb-1">Mês liberado para lançamento</label>
          <input name="mes_aberto" type="month" value="${c.mes_aberto||''}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
          <p class="text-xs text-slate-400 mt-1">Os servidores só conseguem lançar nesse mês. Deixe vazio para liberar todos os meses. (Datas futuras nunca são permitidas.)</p></div>
        <button class="bg-indigo-600 text-white text-sm font-medium px-4 py-2.5 rounded-lg">Salvar parâmetros</button>
      </form>
      <div class="bg-white border border-slate-200 rounded-xl p-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold text-sm">Dias bloqueados</h3>
          <input id="cb-comp" type="month" value="${comp}" class="rounded-lg border border-slate-300 px-2 py-1 text-sm">
        </div>
        <p class="text-xs text-slate-500 mb-2">Clique num dia para bloquear/liberar. Em dias bloqueados, servidores não lançam horas.</p>
        <div class="grid grid-cols-7 gap-1 mb-1 text-center text-xs text-slate-400">${sem.map(s=>`<div>${s}</div>`).join("")}</div>
        <div class="grid grid-cols-7 gap-1">${cells}</div>
        <div class="flex gap-4 mt-3 text-xs text-slate-500">
          <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-rose-100 border border-rose-300 inline-block"></span> bloqueado</span>
          <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-white border border-slate-200 inline-block"></span> liberado</span>
        </div>
      </div>
    </div>`;
  $("#cb-comp").onchange=e=>{window.__compBloq=e.target.value;go("ajustes");};
  $("#f-cfg").onsubmit=async ev=>{
    ev.preventDefault();const f=ev.target;
    const {error}=await sb.from("he_config").update({teto_diario_horas:Number(f.teto_diario_horas.value),mes_aberto:f.mes_aberto.value||null,atualizado_em:new Date().toISOString()}).eq("id",1);
    if(error){toast(error.message,"err");return;}
    CFG.teto_diario_horas=Number(f.teto_diario_horas.value); CFG.mes_aberto=f.mes_aberto.value||null;
    toast("Ajustes salvos.");
  };
}
async function toggleDia(ds,bloqueado){
  if(bloqueado){
    const {error}=await sb.from("he_dias_bloqueados").delete().eq("data",ds);
    if(error){toast(error.message,"err");return;}
    toast("Dia liberado.");
  }else{
    const motivo=prompt("Motivo do bloqueio (opcional):","")||null;
    const {error}=await sb.from("he_dias_bloqueados").insert({data:ds,motivo,criado_por:SESSION.user.id});
    if(error){toast(error.message,"err");return;}
    toast("Dia bloqueado.");
  }
  go("ajustes");
}

// ====================== VIEW: RELATÓRIO (PDF / EXCEL) ======================
async function viewRelatorio(){
  const comp=window.__compRel||thisMonth();
  const base=window.__baseRel||"aprovado";
  const rows=await getRegistros({comp});
  const filtrados=rows.filter(r=> base==="aprovado" ? r.status==="aprovado" : r.status!=="rejeitado");
  const map={};
  filtrados.forEach(r=>{
    const k=r.servidor_id;
    if(!map[k]) map[k]={matricula:r.matricula,nome:r.servidor_nome,sigla:r.chefia_sigla||r.chefia_nome||"—",horas:0,justs:new Set()};
    map[k].horas+=Number(r.horas);
    const j=(r.justificativa||"").trim();
    if(j) map[k].justs.add(j);
  });
  const lista=Object.values(map).sort((a,b)=>a.nome.localeCompare(b.nome));
  window.__rel=lista;
  $("#content").innerHTML=`
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <div><h2 class="text-lg font-semibold">Relatório — ${compLabel(comp)}</h2><p class="text-sm text-slate-500">Horas por servidor; justificativas repetidas são suprimidas.</p></div>
      <div class="flex gap-2 items-center flex-wrap">
        <input id="rl-comp" type="month" value="${comp}" class="rounded-lg border border-slate-300 px-2 py-1.5 text-sm">
        <select id="rl-base" class="rounded-lg border border-slate-300 px-2 py-1.5 text-sm">
          <option value="aprovado"${base==="aprovado"?" selected":""}>Somente aprovadas</option>
          <option value="todas"${base==="todas"?" selected":""}>Aprovadas + pendentes</option>
        </select>
        <button onclick="exportarExcel()" class="text-sm bg-emerald-600 text-white rounded-lg px-3 py-1.5">Excel</button>
        <button onclick="exportarPDF()" class="text-sm bg-rose-600 text-white rounded-lg px-3 py-1.5">PDF</button>
      </div>
    </div>
    <div class="overflow-x-auto bg-white rounded-xl border border-slate-200"><table class="w-full">
      <thead><tr class="text-left text-xs text-slate-400 border-b border-slate-100">
        <th class="px-3 py-2 font-medium">Matrícula</th><th class="px-3 py-2 font-medium">Nome</th>
        <th class="px-3 py-2 font-medium">Setor</th><th class="px-3 py-2 font-medium text-center">Horas no mês</th>
        <th class="px-3 py-2 font-medium">Justificativas (distintas)</th></tr></thead>
      <tbody>${lista.map(x=>`<tr class="border-b border-slate-100 align-top">
        <td class="px-3 py-2 text-sm">${esc(x.matricula)}</td>
        <td class="px-3 py-2 text-sm font-medium">${esc(x.nome)}</td>
        <td class="px-3 py-2 text-sm">${esc(x.sigla)}</td>
        <td class="px-3 py-2 text-sm text-center font-semibold">${hh(x.horas)}</td>
        <td class="px-3 py-2 text-sm"><ul class="list-disc pl-4 space-y-0.5">${[...x.justs].map(j=>`<li>${esc(j)}</li>`).join("")}</ul></td>
      </tr>`).join("")||`<tr><td colspan="5" class="text-center text-slate-400 py-8 text-sm">Sem dados no período.</td></tr>`}</tbody></table></div>`;
  $("#rl-comp").onchange=e=>{window.__compRel=e.target.value;go("relatorio");};
  $("#rl-base").onchange=e=>{window.__baseRel=e.target.value;go("relatorio");};
}
function exportarExcel(){
  const lista=window.__rel||[];
  if(!lista.length){toast("Nada para exportar.","info");return;}
  if(!window.XLSX){toast("Biblioteca Excel ainda carregando. Tente de novo em instantes.","err");return;}
  const aoa=[["Matrícula","Nome","Setor","Horas no mês","Justificativa"],
    ...lista.map(x=>[x.matricula,x.nome,x.sigla,Number(x.horas),[...x.justs].join("; ")])];
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"]=[{wch:12},{wch:26},{wch:10},{wch:14},{wch:60}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Horas Extras");
  XLSX.writeFile(wb, `horas_extras_${window.__compRel||thisMonth()}.xlsx`);
}
function exportarPDF(){
  const lista=window.__rel||[];
  if(!lista.length){toast("Nada para exportar.","info");return;}
  if(!window.jspdf){toast("Biblioteca PDF ainda carregando. Tente de novo em instantes.","err");return;}
  const comp=window.__compRel||thisMonth();
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
  doc.setFont("helvetica","bold"); doc.setFontSize(15);
  doc.text("SDU SUL", W/2, 44, {align:"center"});
  doc.setFontSize(12);
  doc.text(`Horas Extras Referente ${mesAno(comp)}`, W/2, 64, {align:"center"});
  doc.autoTable({
    startY:86,
    head:[["Matrícula","Nome","Setor","Horas no mês","Justificativa"]],
    body:lista.map(x=>[x.matricula, x.nome, x.sigla, hh(x.horas), [...x.justs].join("; ")]),
    styles:{fontSize:8,cellPadding:3,overflow:"linebreak"},
    headStyles:{fillColor:[79,70,229],textColor:255},
    columnStyles:{0:{cellWidth:60},2:{cellWidth:55},3:{cellWidth:60,halign:"center"},4:{cellWidth:200}},
    margin:{left:40,right:40}
  });
  let yy=(doc.lastAutoTable?doc.lastAutoTable.finalY:120)+40;
  if(yy>H-110){ doc.addPage(); yy=80; }
  doc.setFont("helvetica","normal"); doc.setFontSize(10);
  doc.text(`Relatório gerado em ${new Date().toLocaleDateString("pt-BR")}`, 40, yy);
  yy+=80;
  doc.text("__________________________________________", W/2, yy, {align:"center"});
  doc.text("Prefeito", W/2, yy+16, {align:"center"});
  doc.save(`horas_extras_${comp}.pdf`);
}
</script>
